name: 🐞 Bug Report
description: 버그 제보
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐞 버그 설명
        발생한 문제를 명확히 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 문제 내용
      description: 어떤 문제가 발생했는지 설명해주세요
      placeholder: 상세 설명
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 버그를 재현하는 단계
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 정상 동작 시 기대 결과
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 환경 정보
      placeholder: ex) macOS / Chrome 120 / Java 17